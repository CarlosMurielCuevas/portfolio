<div class="chat-flotante">

  <div class="chat-flotante__ventana" [class.abierto]="abierto()">
    <div class="chat-flotante__header">
      <div class="chat-flotante__header-info">
        <div class="chat-flotante__avatar">CM</div>
        <div>
          <p class="chat-flotante__nombre">Asistente de Carlos</p>
          <span class="chat-flotante__estado">En línea</span>
        </div>
      </div>
      <button class="chat-flotante__cerrar" (click)="toggleChat()">✕</button>
    </div>

    <div class="chat-flotante__mensajes" #mensajesContainer>
      <div
        class="chat-flotante__mensaje"
        *ngFor="let msg of mensajes"
        [class.usuario]="msg.esUsuario"
        [class.bot]="!msg.esUsuario"
      >
        <p>{{ msg.texto }}</p>
      </div>

      <div class="chat-flotante__mensaje bot" *ngIf="cargando()">
        <div class="chat-flotante__typing">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>
    </div>

    <div class="chat-flotante__input">
      <input
        type="text"
        [(ngModel)]="inputMensaje"
        (keydown)="onKeyDown($event)"
        placeholder="Escribe tu pregunta..."
        [disabled]="cargando()"
      />
      <button (click)="enviarMensaje()" [disabled]="cargando() || !inputMensaje.trim()">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
  </div>

  <button class="chat-flotante__boton" (click)="toggleChat()" [class.abierto]="abierto()">
    <svg *ngIf="!abierto()" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
      <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/>
    </svg>
    <svg *ngIf="abierto()" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
      <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
    </svg>
  </button>

</div>
